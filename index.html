<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>서울시 상수도 현장관리 프로그램</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/proj4@2.11.0/dist/proj4.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#22d3ee;--done:#34d399;--wait:#94a3b8;--hold:#f87171;--ink:#0d1117;--line:#e4e8ee;--muted:#64748b;
    --mono:"IBM Plex Mono",monospace;--sans:"IBM Plex Sans KR",system-ui,sans-serif;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;font-family:var(--sans)}
  #app{position:relative;height:100vh;max-width:480px;margin:0 auto;overflow:hidden;background:#0d1117}
  #map{position:absolute;inset:0}.leaflet-control-attribution{font-size:9px}
  .top{position:absolute;top:0;left:0;right:0;z-index:1000;padding:10px 13px;background:linear-gradient(180deg,rgba(13,17,23,.92),rgba(13,17,23,.74) 70%,transparent);color:#fff;display:flex;align-items:center;gap:10px;pointer-events:none}
  .top{flex-wrap:wrap}
  .top .b{pointer-events:auto}
  .office-tabs{display:flex;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:9px;padding:3px}
  .office-tabs button{font-family:var(--sans);font-size:12px;font-weight:600;color:#cbd5e1;background:none;border:none;padding:6px 12px;border-radius:7px;cursor:pointer}
  .office-tabs button.on{background:#fff;color:#0d1117}
  .otag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;vertical-align:1px}
  .ot-강동{background:#22d3ee;color:#06222a}.ot-동부{background:#f5a623;color:#3a2600}.top h1{font-size:14px;font-weight:600;margin:0;line-height:1.1}.top .sub{font-family:var(--mono);font-size:9.5px;color:#7d8794;letter-spacing:.4px}
  .kpi{margin-left:auto;text-align:right}.kpi .p{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--accent);line-height:1}.kpi .s{font-size:10px;color:#9aa6b2;margin-top:2px}
  .layerbtn{position:absolute;top:64px;right:13px;z-index:1000;display:flex;flex-direction:column;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.3)}
  .layerbtn button{border:none;background:#fff;font-size:11px;font-weight:600;color:var(--muted);padding:8px 11px;cursor:pointer;border-bottom:1px solid var(--line);font-family:var(--sans)}
  .layerbtn button:last-child{border:none}.layerbtn button.on{background:var(--ink);color:#fff}
  .banner{position:absolute;top:58px;left:13px;right:64px;z-index:1050;color:#06222a;font-size:12.5px;font-weight:600;border-radius:11px;padding:10px 13px;box-shadow:0 4px 16px rgba(0,0,0,.3);display:none;line-height:1.4}
  .banner.show{display:block}.banner.cut{background:var(--accent)}.banner.tap{background:#fde68a}
  .banner small{display:block;font-weight:500;font-size:11px;margin-top:2px;opacity:.85}
  .legend{position:absolute;bottom:14px;left:13px;z-index:900;background:rgba(13,17,23,.82);backdrop-filter:blur(4px);color:#cbd5e1;font-size:10.5px;border-radius:9px;padding:8px 11px;line-height:1.7;pointer-events:none}
  .legend i{display:inline-block;width:14px;height:4px;border-radius:2px;margin-right:6px;vertical-align:2px}
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:1100;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -6px 30px rgba(0,0,0,.35);transform:translateY(108%);transition:transform .32s cubic-bezier(.32,.72,0,1);max-height:78%;overflow:auto;padding-bottom:18px}
  .sheet.open{transform:translateY(0)}.grab{width:38px;height:4px;border-radius:3px;background:#cfd6df;margin:9px auto 4px}.sh-pad{padding:6px 18px 0}
  .sheet-top{position:sticky;top:0;background:#fff;z-index:3;height:26px}
  #grabBar{cursor:pointer}
  .s-close{position:absolute;top:6px;right:12px;background:#eef1f5;border:none;border-radius:8px;color:#475569;font-size:13px;font-weight:700;width:30px;height:26px;cursor:pointer}
  .sheet.collapsed{transform:translateY(108%)!important}
  .sheet-tab{position:absolute;z-index:1090;display:none;left:50%;bottom:16px;transform:translateX(-50%);background:#0d9488;color:#fff;border:none;border-radius:22px;padding:11px 20px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.4)}
  .sheet-tab.show{display:block}
  .sh-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .sh-no{font-family:var(--mono);font-size:13px;color:#0891b2;font-weight:600}.sh-line{font-size:16px;font-weight:600;margin-top:1px}
  .badge{font-family:var(--mono);font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;white-space:nowrap}
  .b-wait{background:#eef1f5;color:#64748b}.b-prog{background:#fef3e2;color:#c97a0a}.b-done{background:#e7f9f0;color:#109b6c}.b-hold{background:#fde9e9;color:#dc4545}
  .warn{margin-top:9px;background:#fff8e6;border:1px solid #f5e0a8;color:#9a6a00;font-size:11.5px;padding:8px 11px;border-radius:9px;line-height:1.5}
  .prog{margin:14px 0 6px}.prog .nums{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--muted)}.prog .nums b{font-family:var(--mono);font-size:20px;color:var(--ink)}
  .track{height:12px;border-radius:7px;background:#eef1f5;overflow:hidden;margin-top:7px}.track i{display:block;height:100%;background:linear-gradient(90deg,var(--done),#6ee7b7);transition:width .4s}
  .rem{text-align:right;font-family:var(--mono);font-size:12px;color:#0891b2;margin-top:5px}
  .modebar{display:flex;gap:8px;margin:14px 0 4px}
  .modebar button{flex:1;font-family:var(--sans);font-weight:600;font-size:13px;border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:11px;padding:11px;cursor:pointer}
  .modebar button.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .modebar button.cut.on{background:var(--accent);border-color:var(--accent);color:#06222a}
  .sec{font-size:12px;color:var(--muted);margin:14px 0 7px;font-weight:500;display:flex;justify-content:space-between}
  .sec a{color:#0891b2;font-weight:600;text-decoration:none}
  .segs{display:flex;flex-direction:column;gap:7px}
  .seg{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:11px;padding:11px 13px;cursor:pointer;transition:.12s}
  .seg:active{transform:scale(.99)}
  .seg.done{background:#ecfdf5;border-color:#a7e8cd}.seg.hold{opacity:.7}
  .seg .ix{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-size:11px;font-weight:600;background:#eef1f5;color:#64748b;flex:none}
  .seg.done .ix{background:var(--done);color:#06251a}
  .seg .rng{flex:1;font-family:var(--mono);font-size:12.5px;color:#334155}
  .seg .ln{font-family:var(--mono);font-size:13px;font-weight:600}
  .seg .st{font-size:11px;font-weight:600;padding:3px 9px;border-radius:14px;background:#eef1f5;color:#64748b}
  .seg.done .st{background:var(--done);color:#06251a}
  .log{margin:10px 0;border:1px solid var(--line);border-radius:10px;max-height:108px;overflow:auto}
  .le{display:flex;justify-content:space-between;padding:9px 12px;font-size:12.5px;border-bottom:1px solid var(--line)}.le:last-child{border:none}
  .le .d{font-family:var(--mono);color:var(--muted)}.le .seg2{font-family:var(--mono);color:#475569;font-size:11px}.le .v{font-family:var(--mono);color:#109b6c;font-weight:600}
  .log-empty{padding:14px;text-align:center;color:#94a3b8;font-size:12px}
  .btn-fill{width:100%;margin-top:11px;background:var(--done);color:#06251a;font-family:var(--sans);font-weight:600;font-size:14px;border:none;border-radius:11px;padding:13px;cursor:pointer}
  .btn-hold{width:100%;margin-top:11px;background:#fff;border:1px solid #f0b4b4;color:#dc4545;font-family:var(--sans);font-weight:600;font-size:14px;border-radius:11px;padding:12px;cursor:pointer}.btn-hold.on{background:var(--hold);color:#fff;border-color:transparent}
  .btn-del{width:100%;margin-top:9px;background:#dc2626;border:none;color:#fff;font-family:var(--sans);font-weight:700;font-size:14px;border-radius:11px;padding:12px;cursor:pointer}
  .btn-reset{width:100%;margin-top:9px;background:#fff;border:1px solid #cbd5e1;color:#475569;font-family:var(--sans);font-weight:600;font-size:14px;border-radius:11px;padding:12px;cursor:pointer}
  .toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);z-index:1300;background:var(--ink);color:#fff;font-size:13px;padding:11px 17px;border-radius:12px;opacity:0;transition:.25s;box-shadow:0 6px 20px rgba(0,0,0,.4);white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast b{color:var(--accent)}
  .cutdot{background:#fff;width:15px;height:15px;border-radius:50%;border:4px solid var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.4)}
  .pickpin{width:20px;height:20px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:#ef4444;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.45)}
  .pickaddr{font-family:var(--sans);font-size:12.5px;color:#1f2937;max-width:210px;line-height:1.45}
  .pickaddr b{display:block;font-size:10.5px;color:#dc2626;font-weight:700;margin-bottom:3px}
  .gulabel{background:rgba(13,17,23,.55);border:none;box-shadow:none;color:#fff;font-family:var(--sans);font-size:12px;font-weight:700;padding:3px 9px;border-radius:8px}
  .gulabel::before{display:none}
  .gulabel.ot-강동{outline:1px solid rgba(34,211,238,.6)}
  .gulabel.ot-동부{outline:1px solid rgba(245,166,35,.6)}
  .datepill{display:flex;align-items:center;gap:8px;margin:12px 0 2px;border:1.5px solid var(--line);background:#f8fafc;border-radius:11px;padding:11px 13px;cursor:pointer}
  .wkchip{display:flex;align-items:center;gap:8px;margin:8px 0 2px;border:1.5px solid var(--line);background:#f8fafc;border-radius:11px;padding:10px 13px;cursor:pointer;font-size:13px}
  .wkchip .lab{color:#64748b;font-weight:600}
  .wkchip .val{flex:1;color:#0f172a;font-weight:600;word-break:break-word}
  .wkchip .car{color:#0d9488;font-weight:700}
  .le .by{color:#0d9488;font-weight:600;margin-left:6px;font-size:11.5px}
  .wk-opt{display:flex;align-items:center;gap:9px;padding:9px 6px;border-bottom:1px solid #1f2630;color:#e6edf3;font-size:14px;cursor:pointer}
  .wk-opt input{width:17px;height:17px}
  .wk-leadlab{color:#9fb0c3;font-size:12px;margin-left:-3px}
  .dc-head{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid #1f2630;color:#e6edf3}
  .dc-head button{background:#21262d;color:#e6edf3;border:none;border-radius:8px;padding:8px 12px;font-family:var(--sans);font-size:14px;cursor:pointer}
  .dc-head #dcTitle{font-size:16px;font-weight:700;min-width:108px;text-align:center}
  .dc-grid-wrap{padding:12px 14px}
  .dc-week{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px}
  .dc-week span{text-align:center;color:#9fb0c3;font-size:12px;font-weight:600}
  .dc-week span:first-child{color:#f87171}.dc-week span:last-child{color:#60a5fa}
  .dc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .dc-cell{min-height:56px;background:#161b22;border:1px solid #1f2630;border-radius:8px;padding:5px 6px;cursor:pointer;color:#e6edf3}
  .dc-cell.empty{background:transparent;border:none;cursor:default}
  .dc-cell.has{border-color:#0d9488}
  .dc-cell.sel{outline:2px solid #0d9488}
  .dc-cell .dn{font-size:12px;color:#9fb0c3}
  .dc-cell .cv{font-size:11px;font-weight:700;color:#34d399;margin-top:3px;line-height:1.15}
  .dc-detail{padding:4px 16px 28px;color:#e6edf3}
  .dc-detail h4{margin:15px 0 8px;font-size:13px;color:#9fb0c3}
  .dc-row{display:flex;justify-content:space-between;padding:7px 2px;border-bottom:1px solid #1f2630;font-size:13px}
  .dc-sum{display:flex;gap:18px;margin:10px 0 4px;font-size:14px;font-weight:700}
  .dc-sum b{color:#34d399}
  .dc-row .wln{color:#5eead4;font-size:11.5px;font-weight:500}
  .dc-mapbtn{background:#0d9488;color:#fff;border:none;border-radius:8px;padding:5px 11px;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;margin-left:8px;vertical-align:2px}


  .datepill .lab{font-size:11.5px;color:var(--muted)}.datepill .val{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--ink);margin-left:auto}.datepill .car{color:var(--muted);font-size:11px}
  .cal-ovl{position:absolute;inset:0;z-index:1400;background:rgba(8,12,18,.5);display:none;align-items:center;justify-content:center;padding:18px}
  .cal-ovl.show{display:flex}
  .cal{width:100%;max-width:340px;background:#fff;border-radius:18px;padding:16px 16px 12px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .cal-head #calTitle{font-size:16px;font-weight:700}
  .cal-head button{border:none;background:#f1f5f9;width:34px;height:34px;border-radius:9px;font-size:18px;color:#475569;cursor:pointer}
  .cal-wk{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11.5px;font-weight:600;color:#64748b;margin-bottom:4px}
  .cal-wk .sun{color:#dc2626}.cal-wk .sat{color:#2563eb}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-grid>div{height:40px}
  .cal-d{position:relative;height:40px;border:none;background:none;border-radius:10px;font-family:var(--mono);font-size:14px;color:#334155;cursor:pointer}
  .cal-d.sun{color:#dc2626}.cal-d.sat{color:#2563eb}
  .cal-d.today{box-shadow:inset 0 0 0 1.5px var(--accent)}
  .cal-d.sel{background:var(--ink);color:#fff!important}
  .cal-d i{position:absolute;left:0;right:0;bottom:2px;font-style:normal;font-size:8px;color:#dc2626;line-height:1}
  .cal-d.sel i{color:#fca5a5}
  .cal-foot{display:flex;gap:8px;margin-top:12px}
  .cal-foot button{flex:1;border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px;font-family:var(--sans);font-weight:600;font-size:13.5px;color:#475569;cursor:pointer}
  .cal-foot #calToday{background:var(--ink);color:#fff;border-color:var(--ink)}
  .mini-edit{font-family:var(--sans);font-size:10.5px;font-weight:600;color:#0891b2;background:#e0f2fe;border:none;border-radius:6px;padding:3px 8px;margin-left:5px;cursor:pointer;vertical-align:1px}
  .ed-ovl{position:absolute;inset:0;z-index:1400;background:rgba(8,12,18,.5);display:none;align-items:center;justify-content:center;padding:18px}
  .ed-ovl.show{display:flex}
  .ed{width:100%;max-width:340px;background:#fff;border-radius:18px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,.4)}
  .ed h3{margin:0 0 14px;font-size:16px}
  .ed label{display:block;font-size:12px;color:#64748b;margin:0 0 6px}
  .ed input{width:100%;font-family:var(--sans);font-size:15px;border:1px solid #cfd6df;border-radius:10px;padding:11px 12px;margin-bottom:13px}
  .ed select,.ed textarea{width:100%;font-family:var(--sans);font-size:15px;border:1px solid #cfd6df;border-radius:10px;padding:11px 12px;margin-bottom:13px;background:#fff;color:#0f172a;resize:vertical}
  .ed input[type=date]{margin-bottom:13px}
  .ed input:focus{outline:none;border-color:var(--accent)}
  .ed-acts{display:flex;gap:9px}
  .ed-acts button{flex:1;border:none;border-radius:10px;padding:12px;font-family:var(--sans);font-weight:600;font-size:14px;cursor:pointer}
  .ed-acts .save{background:var(--ink);color:#fff}.ed-acts .cancel{background:#eef1f5;color:#475569}
  .topbtn{font-family:var(--sans);font-size:12px;font-weight:600;color:#fff;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);border-radius:9px;padding:7px 12px;cursor:pointer}
  .srch-ovl{position:absolute;inset:0;z-index:1500;background:#0d1117;display:none;flex-direction:column}
  #dcOvl{overflow-y:auto;-webkit-overflow-scrolling:touch}
  .adm-ovl{position:absolute;inset:0;z-index:1600;background:#0d1117;color:#e6edf3;display:none;flex-direction:column}
  .adm-ovl.show{display:flex}
  .adm-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #1f2630;font-size:16px;font-weight:700}
  .adm-head button{background:#21262d;color:#e6edf3;border:none;border-radius:8px;padding:8px 14px;font-family:var(--sans);font-size:14px;cursor:pointer}
  .adm-body{padding:16px;overflow:auto;flex:1}
  .adm-h{font-weight:700;margin:0 0 10px;font-size:14px;color:#9fb0c3}
  .adm-sec{background:#161b22;border:1px solid #1f2630;border-radius:12px;padding:14px;margin-bottom:14px}
  .adm-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  .adm-row label{font-size:13px}
  .adm-row .rad{display:flex;align-items:center;gap:5px}

  .adm-ovl input[type=file]{font-size:13px;margin-bottom:10px;color:#9fb0c3}
  .adm-btn{background:#21262d;color:#e6edf3;border:1px solid #30363d;border-radius:9px;padding:10px 14px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer}

  .stat-tbl th:first-child,.stat-tbl td:first-child{text-align:left;color:#cbd5e1}

  .stat-tbl .tot td{font-weight:700;color:#fff;border-top:1px solid #30363d;background:#10161d}
  .edit-fab{position:absolute;left:13px;bottom:24px;z-index:1200}

// reverse geocoding (OpenStreetMap Nominatim) — cached by 지시번호
const addrCache={};
async function reverseGeocode(lat,lng){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=ko&zoom=18`,{headers:{'Accept':'application/json'}});
    const j=await r.json();
    let parts=(j.display_name||'').split(',').map(s=>s.trim()).filter(s=>s&&!/대한민국|South Korea/.test(s));
    return parts.length?parts.reverse().join(' '):`좌표 ${(+lat).toFixed(5)}, ${(+lng).toFixed(5)}`;
  }catch(e){return `좌표 ${(+lat).toFixed(5)}, ${(+lng).toFixed(5)} · 미리보기에서는 자동 주소조회가 제한됩니다 (직접 입력 가능)`;}
}
async function fetchAddr(o){
  if(addrCache[o.no])return addrCache[o.no];

}

function parseDXF(text){
  const ls=text.split(/\r\n|\r|\n/);const pr=[];
  for(let i=0;i+1<ls.length;i+=2)pr.push([parseInt((ls[i]||'').trim(),10),ls[i+1]]);
  const ents=[];let i=0;
  while(i<pr.length&&!(pr[i][0]===2&&(pr[i][1]||'').trim()==='ENTITIES'))i++;i++;
  let cur=null;const push=()=>{if(cur)ents.push(cur);cur=null;};
  for(;i<pr.length;i++){const code=pr[i][0],val=pr[i][1];
    if(code===0){const t=(val||'').trim();if(t==='ENDSEC'){push();break;}push();cur={type:t,x:[],y:[],text:'',ix:null,iy:null,sx:null,sy:null,ex:null,ey:null};}
    else if(cur){const v=(val||'').trim();
      if(cur.type==='LWPOLYLINE'){if(code===10)cur.x.push(parseFloat(v));else if(code===20)cur.y.push(parseFloat(v));}
      else if(cur.type==='LINE'){if(code===10)cur.sx=parseFloat(v);else if(code===20)cur.sy=parseFloat(v);else if(code===11)cur.ex=parseFloat(v);else if(code===21)cur.ey=parseFloat(v);}
      else if(cur.type==='TEXT'||cur.type==='MTEXT'){if(code===1||code===3)cur.text+=v;else if(code===10)cur.ix=parseFloat(v);else if(code===20)cur.iy=parseFloat(v);}
    }}
  const polys=[],texts=[];
  for(const e of ents){
    if(e.type==='LWPOLYLINE'&&e.x.length>=2)polys.push(e.x.map((x,k)=>[x,e.y[k]]));
    else if(e.type==='LINE'&&e.sx!=null&&e.ex!=null)polys.push([[e.sx,e.sy],[e.ex,e.ey]]);
    else if((e.type==='TEXT'||e.type==='MTEXT')&&e.ix!=null){let t=e.text.replace(/\\[A-Za-z][^;]*;/g,'').replace(/[{}]/g,'').trim();texts.push({no:t,x:e.ix,y:e.iy});}
  }
  return {polys,texts};
}
function toLL(x,y){const r=proj4(CONFIG.SRC_EPSG,'WGS84',[x,y]);return [Math.round(r[1]*1e7)/1e7,Math.round(r[0]*1e7)/1e7];}
function _segD(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay,L2=dx*dx+dy*dy;if(L2===0)return Math.hypot(px-ax,py-ay);let t=((px-ax)*dx+(py-ay)*dy)/L2;t=Math.max(0,Math.min(1,t));return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));}
function _ptPolyD(px,py,pts){if(pts.length<2)return Math.hypot(px-pts[0][0],py-pts[0][1]);let m=1e18;for(let i=0;i<pts.length-1;i++)m=Math.min(m,_segD(px,py,pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]));return m;}
function _plenLL(c){let s=0;for(let i=0;i<c.length-1;i++)s+=map.distance(c[i],c[i+1]);return s;}
function dxfToLines(text,office){
  const {polys,texts}=parseDXF(text);
  const pairs=[];
  polys.forEach((p,pi)=>texts.forEach((t,ti)=>pairs.push([_ptPolyD(t.x,t.y,p),pi,ti])));
  pairs.sort((a,b)=>a[0]-b[0]);
  const usedP=new Set(),usedT=new Set(),match={};
  for(const a of pairs){const d=a[0],pi=a[1],ti=a[2];if(usedP.has(pi)||usedT.has(ti))continue;usedP.add(pi);usedT.add(ti);match[pi]=[ti,d];}
  const OK=25;
  return polys.map((p,pi)=>{const m=match[pi];const ti=m?m[0]:null,d=m?m[1]:null;const coords=p.map(xy=>toLL(xy[0],xy[1]));
    return {no:ti!=null?texts[ti].no:('미매칭-'+(pi+1)),office:office,name:'',lenM:Math.round(_plenLL(coords)*10)/10,matchDist:d!=null?Math.round(d*10)/10:999.9,verified:(d!=null&&d<OK),coords:coords,cuts:[],completed:[],daily:[],hold:false};});
}

function mm(a,b){const la=(a[0]+b[0])/2*Math.PI/180;return Math.hypot((b[1]-a[1])*Math.cos(la)*K,(b[0]-a[0])*K);}
function cumM(c){let s=[0];for(let i=0;i<c.length-1;i++)s.push(s[i]+mm(c[i],c[i+1]));return s;}
const totalM=c=>cumM(c).slice(-1)[0];
const LEN=o=>totalM(o.coords);
function ptAt(c,d){const cum=cumM(c),T=cum[cum.length-1];d=Math.max(0,Math.min(T,d));for(let i=0;i<c.length-1;i++)if(cum[i+1]>=d){const t=(d-cum[i])/((cum[i+1]-cum[i])||1);return[c[i][0]+(c[i+1][0]-c[i][0])*t,c[i][1]+(c[i+1][1]-c[i][1])*t];}return c[c.length-1];}
function sliceLL(c,a,b){if(b<a)[a,b]=[b,a];const cum=cumM(c),out=[ptAt(c,a)];for(let i=0;i<c.length;i++)if(cum[i]>a&&cum[i]<b)out.push(c[i]);out.push(ptAt(c,b));return out;}
function snap(c,ll){const lat0=c[0][0],lon0=c[0][1],cl=Math.cos(lat0*Math.PI/180);const xy=p=>[(p[1]-lon0)*cl*K,(p[0]-lat0)*K];const P=xy(ll),cum=cumM(c);let best=null;
  for(let i=0;i<c.length-1;i++){const A=xy(c[i]),B=xy(c[i+1]),dx=B[0]-A[0],dy=B[1]-A[1],L2=dx*dx+dy*dy;let t=L2?((P[0]-A[0])*dx+(P[1]-A[1])*dy)/L2:0;t=Math.max(0,Math.min(1,t));const pd=Math.hypot(P[0]-(A[0]+t*dx),P[1]-(A[1]+t*dy)),dist=cum[i]+t*(cum[i+1]-cum[i]);if(!best||pd<best.pd)best={pd,dist};}return best.dist;}
function merge(iv){iv=iv.map(x=>[Math.min(x[0],x[1]),Math.max(x[0],x[1])]).sort((a,b)=>a[0]-b[0]);const o=[];for(const s of iv){if(o.length&&s[0]<=o[o.length-1][1]+.3)o[o.length-1][1]=Math.max(o[o.length-1][1],s[1]);else o.push([...s]);}return o;}

const covered=(list,x)=>list.some(([a,b])=>x>=a-.5&&x<=b+.5);

const pct=o=>{const T=LEN(o);return T>0?Math.min(100,Math.round(doneM(o)/T*100)):0;};
function statusOf(o){if(o.hold)return'보류';const d=doneM(o);const T=LEN(o);if(d<=.5)return'대기';if(d>=T-0.5)return'완료';return'진행중';}
const SB={'대기':'b-wait','진행중':'b-prog','완료':'b-done','보류':'b-hold'};

function gap(len){return Math.min(len*0.12,3.5);}
function drawLines(){

  LINES.forEach((o,idx)=>{
    if(OFFICE!=='전체'&&o.office!==OFFICE)return;
    const sel=SEL===idx,g=[],T=totalM(o.coords);
    segsOf(o).forEach(([a,b])=>{
      const gp=sel?gap(b-a):0, A=Math.min(a+gp,b), B=Math.max(b-gp,a);
      const dn=segDone(o,a,b), path=sliceLL(o.coords,A,B);
      const col=o.hold&&!dn?'#ef4444':(dn?'#34d399':'#f59e0b');
      // white casing so the line stays visible on both street and satellite
      g.push(L.polyline(path,{color:'#ffffff',weight:sel?12:9,opacity:.95,interactive:false}).addTo(map));
      const pl=L.polyline(path,{color:col,weight:sel?8:6,opacity:1,dashArray:(o.hold&&!dn)?'1 9':null,interactive:false}).addTo(map);
      g.push(pl);
    });
    const hit=L.polyline(o.coords,{color:'#000',weight:34,opacity:0}).addTo(map);
    hit.bindTooltip(esc(o.no),{sticky:true,direction:'top',opacity:0.95});
    hit.on('click',e=>{if(mode==='draw'){addVertex(e.latlng);return;}if(mode==='editgeo')return;onLineClick(idx, snap(o.coords,[e.latlng.lat,e.latlng.lng]));});g.push(hit);
    gLayers[idx]=g;

async function completeRemaining(idx){

/* ===== 선형 변형 (관리자 전용) ===== */
let editingGeo=false, egPts=[], egVtx=[], egLine=null, egNo=null, egOffice=null;
function clearEG(){egVtx.forEach(m=>map.removeLayer(m));egVtx=[];if(egLine){map.removeLayer(egLine);egLine=null;}}
function nearestSegIndex(pts,ll){const cl=Math.cos(pts[0][0]*Math.PI/180);const xy=p=>[p[1]*cl,p[0]];const P=xy([ll.lat,ll.lng]);let best=0,bd=1e18;for(let i=0;i<pts.length-1;i++){const A=xy(pts[i]),B=xy(pts[i+1]);const dx=B[0]-A[0],dy=B[1]-A[1],L2=dx*dx+dy*dy;let t=L2?((P[0]-A[0])*dx+(P[1]-A[1])*dy)/L2:0;t=Math.max(0,Math.min(1,t));const px=A[0]+t*dx,py=A[1]+t*dy;const d=(P[0]-px)*(P[0]-px)+(P[1]-py)*(P[1]-py);if(d<bd){bd=d;best=i;}}return best;}
function renderEG(){
  clearEG();
  egLine=L.polyline(egPts,{color:'#f59e0b',weight:5,opacity:.95,dashArray:'4 4'}).addTo(map);
  egLine.on('click',e=>{const i=nearestSegIndex(egPts,e.latlng);egPts.splice(i+1,0,[e.latlng.lat,e.latlng.lng]);renderEG();L.DomEvent.stop(e);});
  egPts.forEach((p,i)=>{
    const m=L.marker(p,{draggable:true,icon:L.divIcon({className:'',html:'<div class="ve-dot"></div>',iconSize:[16,16],iconAnchor:[8,8]}),zIndexOffset:2000}).addTo(map);
    m.on('drag',ev=>{const ll=ev.target.getLatLng();egPts[i]=[ll.lat,ll.lng];egLine.setLatLngs(egPts);});
    m.on('dblclick',()=>{if(egPts.length>2){egPts.splice(i,1);renderEG();}else{toast('점은 2개 이상이어야 합니다');}});
    egVtx.push(m);
  });
}

/* ===== 통계 (관리자 전용) ===== */
function statFor(lines){
  const r={cntT:0,mT:0,cntDone:0,mDone:0,cntProg:0,mProg:0,cntWait:0,mWait:0,cntHold:0,mHold:0};
  lines.forEach(o=>{const T=LEN(o),st=statusOf(o);r.cntT++;r.mT+=T;
    if(st==='완료'){r.cntDone++;r.mDone+=T;}
    else if(st==='진행중'){r.cntProg++;r.mProg+=T;}
    else if(st==='보류'){r.cntHold++;r.mHold+=T;}
    else{r.cntWait++;r.mWait+=T;}});
  return r;
}
function _sRow(label,c,m,cls){return '<tr'+(cls?' class="'+cls+'"':'')+'><td>'+label+'</td><td>'+c+' 건</td><td>'+fmt(m)+' m</td></tr>';}
function _sTbl(title,r){
  return '<table class="stat-tbl"><caption>'+title+'</caption>'
    +'<thead><tr><th>구분</th><th>건수</th><th>물량</th></tr></thead><tbody>'
    +_sRow('공사지시(총)',r.cntT,r.mT,'tot')
    +_sRow('완료',r.cntDone,r.mDone)
    +_sRow('진행',r.cntProg,r.mProg)
    +_sRow('미진행',r.cntWait,r.mWait)
    +_sRow('보류',r.cntHold,r.mHold)
    +'</tbody></table>';
}
function renderStats(){
  const box=document.getElementById('statBox');if(!box)return;
  const g=statFor(LINES.filter(l=>l.office==='강동'));
  const d=statFor(LINES.filter(l=>l.office==='동부'));
  const a=statFor(LINES);
  box.innerHTML=_sTbl('강동수도사업소',g)+_sTbl('동부수도사업소',d)+_sTbl('합계',a);
}

function renderRoster(){const el=document.getElementById('wkRoster');if(!el)return;el.innerHTML='';
  if(!WORKERS.length){el.innerHTML='<div class="adm-item">등록된 작업자가 없습니다.</div>';return;}
  WORKERS.forEach((w,i)=>{const d=document.createElement('div');d.className='adm-item';
    const sp=document.createElement('span');sp.textContent=(w.office?'['+w.office+'] ':'[공통] ')+w.name;
    const b=document.createElement('button');b.textContent='삭제';b.onclick=async()=>{if(!confirm(w.name+' 삭제?'))return;WORKERS.splice(i,1);await saveWorkers();renderRoster();};
    d.appendChild(sp);d.appendChild(b);el.appendChild(d);});
}
async function addWorker(){const n=document.getElementById('wkName').value.trim();const of=document.getElementById('wkOffice').value;
  if(!n){toast('이름을 입력하세요');return;}
  if(WORKERS.find(w=>w.name===n&&w.office===of)){toast('이미 있는 작업자');return;}
  WORKERS.push({name:n,office:of});await saveWorkers();document.getElementById('wkName').value='';renderRoster();toast('작업자 추가됨');}

/* 오늘 작업자 선택 모달 */
function openWk(){
  const list=document.getElementById('wkList');list.innerHTML='';
  const office=(SEL!=null&&LINES[SEL])?LINES[SEL].office:null;
  const avail=WORKERS.filter(w=>!w.office||!office||w.office===office);
  if(!avail.length){list.innerHTML='<div style="color:#9fb0c3;font-size:13px;padding:8px 4px">등록된 작업자가 없습니다. 아래에 직접 입력하거나, 관리자 화면에서 명단을 등록하세요.</div>';}
  avail.forEach(w=>{
    const row=document.createElement('label');row.className='wk-opt';
    const cb=document.createElement('input');cb.type='checkbox';cb.className='wk-inc';cb.value=w.name;cb.checked=(todayLead===w.name||todayHelpers.includes(w.name));
    const sp=document.createElement('span');sp.style.flex='1';sp.textContent=w.name+(w.office?' ('+w.office+')':'');
    const rd=document.createElement('input');rd.type='radio';rd.name='wkLead';rd.className='wk-lead';rd.value=w.name;rd.checked=(todayLead===w.name);
    const rl=document.createElement('span');rl.className='wk-leadlab';rl.textContent='대표';
    row.appendChild(cb);row.appendChild(sp);row.appendChild(rd);row.appendChild(rl);list.appendChild(row);});
  document.getElementById('wkManual').value='';
  document.getElementById('wkOvl').classList.add('show');
}
function confirmWk(){
  const inc=[...document.querySelectorAll('#wkList .wk-inc:checked')].map(c=>c.value);
  const manual=document.getElementById('wkManual').value.split(',').map(s=>s.trim()).filter(Boolean);
  let included=[...new Set([...inc,...manual])];
  const le=document.querySelector('#wkList .wk-lead:checked');
  let lead=le?le.value:null;
  if(lead&&!included.includes(lead))included.unshift(lead);
  if(!lead)lead=included[0]||null;
  todayLead=lead; todayHelpers=included.filter(n=>n!==lead);
  document.getElementById('wkOvl').classList.remove('show');
  renderSheet();
  toast(todayLead?('대표 '+todayLead+(todayHelpers.length?' · 보조 '+todayHelpers.join(', '):'')):'작업자 미지정');
}
document.getElementById('wkOk').onclick=confirmWk;
document.getElementById('wkCancel').onclick=()=>document.getElementById('wkOvl').classList.remove('show');


/* ===== 일자별 현황 (달력) ===== */
let dcY,dcM,dcSel=null;
function allEntries(){const out=[];LINES.forEach(o=>(o.daily||[]).forEach(e=>out.push({d:e.d,v:e.v||0,by:e.by,no:o.no,office:o.office})));return out;}
function dayMap(){const m={};allEntries().forEach(e=>{if(!m[e.d])m[e.d]={v:0,lines:{},workers:{}};m[e.d].v+=e.v;const k='['+(e.office||'')+'] '+e.no;m[e.d].lines[k]=(m[e.d].lines[k]||0)+e.v;const wo=whoOf(e.by);if(!m[e.d].workers[wo.lead])m[e.d].workers[wo.lead]={v:0,lines:{},help:{}};m[e.d].workers[wo.lead].v+=e.v;m[e.d].workers[wo.lead].lines[k]=(m[e.d].workers[wo.lead].lines[k]||0)+e.v;wo.helpers.forEach(hn=>{if(!m[e.d].workers[hn])m[e.d].workers[hn]={v:0,lines:{},help:{}};m[e.d].workers[hn].help[k]=true;});});return m;}
function dcOpen(){const t=workDate?new Date(workDate+'T00:00:00'):new Date();dcY=t.getFullYear();dcM=t.getMonth();dcSel=null;document.getElementById('dcOvl').classList.add('show');dcRender();}
function dcRender(){
  const M=dayMap();document.getElementById('dcTitle').textContent=dcY+'.'+String(dcM+1).padStart(2,'0');
  const grid=document.getElementById('dcGrid');grid.innerHTML='';
  const first=new Date(dcY,dcM,1).getDay(),days=new Date(dcY,dcM+1,0).getDate();
  for(let i=0;i<first;i++){const c=document.createElement('div');c.className='dc-cell empty';grid.appendChild(c);}
  for(let d=1;d<=days;d++){const ds=dcY+'-'+String(dcM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const c=document.createElement('div');c.className='dc-cell'+(M[ds]?' has':'')+(dcSel===ds?' sel':'');
    c.innerHTML='<div class="dn">'+d+'</div>'+(M[ds]?'<div class="cv">'+fmt(M[ds].v)+'m</div>':'');
    c.onclick=()=>{dcSel=ds;dcRender();};grid.appendChild(c);}
  dcDetail(M);
}
function dcDetail(M){const el=document.getElementById('dcDetail');
  if(!dcSel){el.innerHTML='<p style="color:#9fb0c3;font-size:13px">날짜를 누르면 그날의 작업 현황이 표시됩니다.</p>';return;}
  const day=M[dcSel];
  if(!day){el.innerHTML='<h4>'+dcSel+'</h4><p style="color:#9fb0c3;font-size:13px">작업 기록이 없습니다.</p>';return;}
  let h='<h4>'+dcSel+' <button id="dcShowMap" class="dc-mapbtn">지도에서 보기</button></h4><div class="dc-sum"><span>총물량 <b>'+fmt(day.v)+' m</b></span><span>지시건 <b>'+Object.keys(day.lines).length+' 건</b></span></div>';
  h+='<h4>작업자별 (물량 = 대표 기준)</h4>';
  const ws=Object.entries(day.workers).sort((a,b)=>b[1].v-a[1].v);
  h+=ws.length?ws.map(([w,obj])=>{const led=Object.keys(obj.lines||{});const hel=Object.keys(obj.help||{});let det=led.length?'<span class="wln">'+esc(led.join(', '))+'</span>':'';if(hel.length)det+=' <span class="wln" style="color:#94a3b8">보조: '+esc(hel.join(', '))+'</span>';return '<div class="dc-row"><span>'+esc(w)+' '+det+'</span><span>'+fmt(obj.v)+' m</span></div>';}).join(''):'<div class="dc-row"><span>-</span><span></span></div>';
  h+='<h4>지시건별</h4>';
  h+=Object.entries(day.lines).sort((a,b)=>b[1]-a[1]).map(([k,v])=>'<div class="dc-row"><span>'+esc(k)+'</span><span>'+fmt(v)+' m</span></div>').join('');
  el.innerHTML=h;
  const _sm=document.getElementById('dcShowMap');if(_sm)_sm.onclick=()=>{document.getElementById('dcOvl').classList.remove('show');highlightDate(dcSel);};
  if(dcSel&&window.innerWidth<760)setTimeout(()=>{el.scrollIntoView({behavior:'smooth',block:'start'});},60);
}
document.getElementById('calBtn').onclick=dcOpen;
document.getElementById('dcClose').onclick=()=>document.getElementById('dcOvl').classList.remove('show');
document.getElementById('dcPrev').onclick=()=>{dcM--;if(dcM<0){dcM=11;dcY--;}dcSel=null;dcRender();};
document.getElementById('dcNext').onclick=()=>{dcM++;if(dcM>11){dcM=0;dcY++;}dcSel=null;dcRender();};


/* ===== 일자별 라인 하이라이트 ===== */
let hlLayers=[], hlTimer=null;
function clearHighlight(){hlLayers.forEach(l=>map.removeLayer(l));hlLayers=[];if(hlTimer){clearInterval(hlTimer);hlTimer=null;}}
function highlightDate(ds){
  clearHighlight();
  const want=new Set();
  LINES.forEach(o=>{if((o.daily||[]).some(e=>e.d===ds))want.add(o.office+'|'+o.no);});
  const lines=LINES.filter(o=>want.has(o.office+'|'+o.no)&&(o.coords||[]).length>=2);
  if(!lines.length){toast('그날 작업한 라인이 없습니다');return;}
  const all=[];
  lines.forEach(o=>{
    const pl=L.polyline(o.coords,{color:'#f43f5e',weight:9,opacity:.95,interactive:false}).addTo(map);
    hlLayers.push(pl);all.push(...o.coords);
  });
  try{const b=L.latLngBounds(all);if(b.isValid())map.fitBounds(b.pad(0.25),{maxZoom:18});}catch(e){}
  // 깜빡임 (일시적)
  let on=true,ticks=0;
  hlTimer=setInterval(()=>{on=!on;hlLayers.forEach(l=>l.setStyle({opacity:on?.95:.15,weight:on?9:5}));ticks++;if(ticks>=12){clearHighlight();}},450);
  toast(ds+' · '+lines.length+'개 라인 표시');
}

function setupShare(){
  const url=CONFIG.SHARE_URL||(location.origin+location.pathname);
  const inp=document.getElementById('shareUrl');if(inp)inp.value=url;
  const cp=document.getElementById('shareCopy');if(cp)cp.onclick=async()=>{try{await navigator.clipboard.writeText(url);toast('링크가 복사되었습니다');}catch(e){inp.select();document.execCommand('copy');toast('링크가 복사되었습니다');}};
  const sd=document.getElementById('shareSend');if(sd)sd.onclick=async()=>{if(navigator.share){try{await navigator.share({title:'서울시 상수도 현장관리',url:url});}catch(e){}}else{try{await navigator.clipboard.writeText(url);toast('이 기기는 공유 미지원 · 링크 복사됨');}catch(e){toast('링크: '+url);}}};
}
(async()=>{await loadWorkers();await load();drawLines();renderKpi();
  try{if(LINES.length){const b=L.latLngBounds(LINES.flatMap(o=>o.coords||[]));if(b.isValid())map.fitBounds(b.pad(0.1));}}catch(e){console.error('fit',e);}
  setTimeout(()=>map.invalidateSize(),200);
  toast('라인 '+LINES.length+'개 불러옴');
})();
function setRole(){const el=document.getElementById('roleSub');if(el)el.textContent=(innerWidth>=760?'PC · 관리자 (전체화면)':'모바일 · 현장 사용자');}
setRole();addEventListener('resize',()=>{setRole();setTimeout(()=>map.invalidateSize(),120);});
document.querySelectorAll('#officeTabs button').forEach(b=>b.onclick=()=>setOffice(b.dataset.o));
document.getElementById('lyBound').onclick=function(){boundsOn=!boundsOn;if(boundsOn){boundaryLayer.addTo(map);this.classList.add('on');}else{map.removeLayer(boundaryLayer);this.classList.remove('on');}};
